<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/fragments :: html_head('Đăng ký')}"></head>
<body>
<header th:replace="~{layout/fragments :: header('register')}"></header>

<main class="container" style="display:flex;justify-content:center;align-items:center;min-height:80vh;">
    <section class="glass-card fade-in" style="padding:32px;max-width:500px;width:100%;border-radius:16px;">
        <h2 style="text-align:center;margin-bottom:10px;font-weight:800;color:var(--primary-dark);">Đăng ký tài khoản</h2>
        <p class="muted-text" style="text-align:center;margin-bottom:24px;">Tạo tài khoản khách hàng để mua hàng và theo dõi đơn.</p>

        <div class="alert alert-success" th:if="${registerSuccess}">
            <i class="fa-solid fa-circle-check"></i>
            <span th:text="${registerSuccess}"></span>
            <a th:href="@{/login(username=${registeredUserName})}" class="btn btn-outline" style="margin-left:auto;">Đăng nhập</a>
        </div>

        <div class="alert alert-error" th:if="${registerError}">
            <i class="fa-solid fa-circle-exclamation"></i>
            <span th:text="${registerError}"></span>
        </div>

        <div class="alert alert-error" th:if="${#fields.hasGlobalErrors()}">
            <i class="fa-solid fa-circle-exclamation"></i>
            <span th:each="err : ${#fields.globalErrors()}" th:text="${err}"></span>
        </div>

        <form action="/login" th:action="@{/login}" th:object="${registerRequest}" method="post" class="admin-form">
            <input type="hidden" name="register" value="true">
            <div class="form-group">
                <label for="userName">Tên đăng nhập</label>
                <input id="userName" th:field="*{userName}" type="text" class="form-control"
                       th:classappend="${#fields.hasErrors('userName')} ? ' input-error' : ''"
                       autocomplete="username" required>
                <div class="field-error" th:if="${#fields.hasErrors('userName')}" th:errors="*{userName}"></div>
            </div>

            <div class="form-group">
                <label for="password">Mật khẩu</label>
                <input id="password" th:field="*{password}" type="password" class="form-control"
                       th:classappend="${#fields.hasErrors('password')} ? ' input-error' : ''"
                       autocomplete="new-password" required>
                <div class="field-error" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></div>
            </div>

            <div class="form-group">
                <label for="fullName">Họ và tên</label>
                <input id="fullName" th:field="*{fullName}" type="text" class="form-control"
                       th:classappend="${#fields.hasErrors('fullName')} ? ' input-error' : ''"
                       autocomplete="name" required>
                <div class="field-error" th:if="${#fields.hasErrors('fullName')}" th:errors="*{fullName}"></div>
            </div>

            <div class="form-group">
                <label for="email">Email</label>
                <input id="email" th:field="*{email}" type="email" class="form-control"
                       th:classappend="${#fields.hasErrors('email')} ? ' input-error' : ''"
                       autocomplete="email" required>
                <div class="field-error" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
            </div>

            <div class="form-group">
                <label for="phone">Số điện thoại</label>
                <input id="phone" th:field="*{phone}" type="tel" class="form-control"
                       th:classappend="${#fields.hasErrors('phone')} ? ' input-error' : ''"
                       pattern="^$|^0[0-9]{9}$" minlength="10" maxlength="10"
                       title="Số điện thoại phải gồm 10 chữ số và bắt đầu bằng 0"
                       autocomplete="tel" placeholder="Có thể bỏ trống">
                <div class="field-error" th:if="${#fields.hasErrors('phone')}" th:errors="*{phone}"></div>
            </div>

            <div class="form-group">
                <label for="address">Địa chỉ</label>
                <input id="address" th:field="*{address}" type="text" class="form-control"
                       th:classappend="${#fields.hasErrors('address')} ? ' input-error' : ''"
                       autocomplete="street-address" placeholder="Có thể bỏ trống">
                <div class="field-error" th:if="${#fields.hasErrors('address')}" th:errors="*{address}"></div>
            </div>

            <button type="submit" class="btn btn-primary" style="width:100%;">
                <i class="fa-solid fa-user-plus"></i> Đăng ký
            </button>
        </form>

        <p style="margin-top:16px;text-align:center;">
            Đã có tài khoản?
            <a th:href="@{/login}" class="btn btn-outline" style="margin-left:8px;">Đăng nhập</a>
        </p>
    </section>
</main>

<footer th:replace="~{layout/fragments :: footer}"></footer>
</body>
</html>
