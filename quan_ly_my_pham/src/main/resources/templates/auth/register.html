<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/fragments :: html_head('Đăng ký')}"></head>
<body>
  <header th:replace="~{layout/fragments :: header('register')}"></header>
  <main class="container" style="display:flex;justify-content:center;align-items:center;min-height:80vh;">
    <section class="glass-card" style="padding:32px;max-width:460px;width:100%;border-radius:16px;box-shadow:var(--shadow-lg);background:rgba(255,255,255,0.25);backdrop-filter:blur(12px);">
      <h2 style="text-align:center;margin-bottom:24px;font-weight:800;color:var(--primary-dark);">Đăng ký tài khoản</h2>
      <div class="message error" th:if="${registerError}" th:text="${registerError}" style="background:#fdecea;color:#b91c1c;border:1px solid #fca5a5;padding:10px;margin-bottom:12px;"></div>
      <form th:action="@{/register}" th:object="${registerRequest}" method="post" style="display:flex;flex-direction:column;gap:16px;">
        <div>
          <label for="userName">Tên đăng nhập</label>
          <input id="userName" th:field="*{userName}" type="text" required style="width:100%;padding:10px;border:1px solid var(--border);border-radius:var(--radius-sm);">
        </div>
        <div>
          <label for="password">Mật khẩu</label>
          <input id="password" th:field="*{password}" type="password" required style="width:100%;padding:10px;border:1px solid var(--border);border-radius:var(--radius-sm);">
        </div>
        <div>
          <label for="fullName">Họ và tên</label>
          <input id="fullName" th:field="*{fullName}" type="text" required style="width:100%;padding:10px;border:1px solid var(--border);border-radius:var(--radius-sm);">
        </div>
        <div>
          <label for="email">Email</label>
          <input id="email" th:field="*{email}" type="email" required style="width:100%;padding:10px;border:1px solid var(--border);border-radius:var(--radius-sm);">
        </div>
        <div>
          <label for="phone">Số điện thoại</label>
          <input id="phone" th:field="*{phone}" type="text" style="width:100%;padding:10px;border:1px solid var(--border);border-radius:var(--radius-sm);">
        </div>
        <div>
          <label for="address">Địa chỉ</label>
          <input id="address" th:field="*{address}" type="text" style="width:100%;padding:10px;border:1px solid var(--border);border-radius:var(--radius-sm);">
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%;">Đăng ký</button>
      </form>
      <p style="margin-top:16px;text-align:center;">
        Đã có tài khoản? <a th:href="@{/login}" class="btn btn-outline" style="margin-left:8px;">Đăng nhập</a>
      </p>
    </section>
  </main>
  <footer th:replace="~{layout/fragments :: footer}"></footer>
</body>
</html>
