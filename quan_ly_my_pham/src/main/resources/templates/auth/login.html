<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Dang nhap</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; background: #f7f7f7; }
        main { max-width: 420px; margin: 0 auto; padding: 24px; background: #fff; border: 1px solid #ddd; }
        label { display: block; margin-top: 12px; }
        input { width: 100%; box-sizing: border-box; padding: 10px; margin-top: 4px; }
        button { margin-top: 16px; padding: 10px 16px; cursor: pointer; }
        .message { padding: 10px; margin-bottom: 12px; background: #eef6ee; border: 1px solid #b6d7b6; }
        .error { background: #fdecec; border-color: #e6b5b5; }
    </style>
</head>
<body>
<main>
    <h1>Dang nhap</h1>
    <div class="message" th:if="${param.registered}">Dang ky thanh cong. Ban co the dang nhap.</div>
    <div class="message" th:if="${param.logout}">Ban da dang xuat.</div>
    <div class="message error" th:if="${param.error}">Sai ten dang nhap, mat khau hoac tai khoan dang bi khoa.</div>

    <form th:action="@{/login}" method="post">
        <label for="username">Ten dang nhap</label>
        <input id="username" name="username" type="text" autocomplete="username" required>

        <label for="password">Mat khau</label>
        <input id="password" name="password" type="password" autocomplete="current-password" required>

        <label>
            <input name="remember-me" type="checkbox" style="width:auto"> Ghi nho dang nhap
        </label>

        <button type="submit">Dang nhap</button>
    </form>

    <p>Chua co tai khoan? <a th:href="@{/register}">Dang ky</a></p>
    <p><a th:href="@{/products}">Quay lai san pham</a></p>
</main>
</body>
</html>
