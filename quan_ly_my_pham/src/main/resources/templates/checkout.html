<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/fragments :: html_head('Thanh toán')}"></head>
<body>

<!-- Header dùng chung -->
<header th:replace="~{layout/fragments :: header('cart')}"></header>

<main class="container">
    <div class="alert alert-error" th:if="${errorMessage}" style="grid-column: 1 / -1; width: 100%;">
        <i class="fa-solid fa-triangle-exclamation"></i>
        <span th:text="${errorMessage}"></span>
    </div>

    <div style="grid-column: 1 / -1; border-bottom: 2px solid var(--border); padding-bottom: 12px; margin-bottom: 10px;">
        <h1 style="font-weight: 800; color: var(--dark); font-size: 2rem;">
            <i class="fa-solid fa-wallet" style="color: var(--primary);"></i> Tiến hành thanh toán
        </h1>
    </div>

    <!-- Layout 2 cột -->
    <div style="display: grid; grid-template-columns: 1fr 400px; gap: 30px; grid-column: 1 / -1; align-items: start;">
        
        <!-- Cột trái: Thông tin giao hàng -->
        <section class="admin-card" style="margin: 0; padding: 24px;">
            <h2 style="font-size: 1.25rem; font-weight: 800; color: var(--dark); margin-bottom: 20px; border-bottom: 1px solid var(--border); padding-bottom: 10px;">
                <i class="fa-solid fa-truck" style="color: var(--secondary); margin-right: 8px;"></i>Thông tin nhận hàng
            </h2>
            
            <form th:action="@{/checkout}" method="post" style="display: flex; flex-direction: column; gap: 16px;">
                <div class="form-group">
                    <label for="receiverName">Tên người nhận <span style="color: var(--error)">*</span></label>
                    <input id="receiverName" name="receiverName" class="form-control" type="text" required th:value="${user.fullName}">
                </div>

                <div class="form-group">
                    <label for="receiverPhone">Số điện thoại liên hệ <span style="color: var(--error)">*</span></label>
                    <input id="receiverPhone" name="receiverPhone" class="form-control" type="tel" required
                           pattern="^0[0-9]{9}$" minlength="10" maxlength="10"
                           title="Số điện thoại phải gồm 10 chữ số và bắt đầu bằng 0"
                           th:value="${user.phone}">
                </div>

                <div class="form-group">
                    <label for="shippingAddress">Địa chỉ nhận hàng <span style="color: var(--error)">*</span></label>
                    <input id="shippingAddress" name="shippingAddress" class="form-control" type="text" required th:value="${user.address}">
                </div>

                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">
                    <div class="form-group">
                        <label for="paymentMethod">Phương thức thanh toán <span style="color: var(--error)">*</span></label>
                        <select id="paymentMethod" name="paymentMethod" class="form-control" required>
                            <option th:each="method : ${paymentMethods}" th:value="${method}" th:text="${method.displayName}"></option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="promotionCode">Mã giảm giá (nếu có)</label>
                        <input id="promotionCode" name="promotionCode" class="form-control" type="text" placeholder="Ví dụ: WELCOME10">
                    </div>
                </div>

                <div class="form-group" style="display: none;">
                    <!-- Giữ lại trường shippingFee ẩn để tránh lỗi form submit nếu Backend yêu cầu, hoặc để mặc định như cũ -->
                    <label for="shippingFee">Phí giao hàng</label>
                    <input id="shippingFee" name="shippingFee" class="form-control" type="number" min="0" th:value="${shippingFee}">
                </div>

                <div class="form-group">
                    <label for="note">Ghi chú giao hàng</label>
                    <textarea id="note" name="note" class="form-control" rows="3" placeholder="Ghi chú thêm cho shipper..."></textarea>
                </div>

                <button type="submit" class="btn btn-primary" style="padding: 12px; font-size: 1.05rem; margin-top: 10px;">
                    <i class="fa-solid fa-circle-check"></i> Xác nhận đặt hàng
                </button>
            </form>
        </section>

        <!-- Cột phải: Đơn hàng tóm tắt -->
        <section class="admin-card" style="margin: 0; padding: 24px; background-color: var(--light);">
            <h2 style="font-size: 1.25rem; font-weight: 800; color: var(--dark); margin-bottom: 20px; border-bottom: 1px solid var(--border); padding-bottom: 10px;">
                <i class="fa-solid fa-box-open" style="color: var(--primary); margin-right: 8px;"></i>Tóm tắt đơn hàng
            </h2>
            
            <div class="table-responsive" style="border: none; box-shadow: none; margin-bottom: 20px;">
                <table class="table-custom" style="font-size: 0.9rem;">
                    <thead>
                    <tr>
                        <th style="padding: 10px 0;">Sản phẩm</th>
                        <th style="padding: 10px 0; text-align: right;">SL</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="item : ${items}">
                        <td style="padding: 12px 0; font-weight: 500;" th:text="${item.product.name}">Sản phẩm</td>
                        <td style="padding: 12px 0; text-align: right; font-weight: 700; color: var(--text-muted);" th:text="${item.quantity}">1</td>
                    </tr>
                    </tbody>
                </table>
            </div>

            <!-- Tổng kết tiền bạc -->
            <div style="border-top: 2px dashed var(--border); padding-top: 16px;">
                <div class="summary-row" style="display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 0.95rem;">
                    <span style="color: var(--text-muted);">Tạm tính</span>
                    <strong th:text="${#numbers.formatDecimal(subtotal, 0, 'COMMA', 0, 'POINT')} + ' đ'"></strong>
                </div>
                <div class="summary-row" style="display: flex; justify-content: space-between; margin-bottom: 16px; font-size: 0.95rem;">
                    <span style="color: var(--text-muted);">Phí giao hàng</span>
                    <strong th:text="${#numbers.formatDecimal(shippingFee, 0, 'COMMA', 0, 'POINT')} + ' đ'"></strong>
                </div>
                <div class="summary-row" style="display: flex; justify-content: space-between; margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border); font-size: 1.15rem; color: var(--primary-dark);">
                    <span>Tổng thanh toán</span>
                    <strong th:text="${#numbers.formatDecimal(subtotal + shippingFee, 0, 'COMMA', 0, 'POINT')} + ' đ'" style="font-size: 1.3rem; font-weight: 800;"></strong>
                </div>
            </div>
            
            <div style="margin-top: 24px;">
                <a th:href="@{/cart}" class="btn btn-secondary" style="width: 100%;">
                    <i class="fa-solid fa-arrow-left-long"></i> Quay lại giỏ hàng
                </a>
            </div>
        </section>
        
    </div>
</main>

<!-- Footer dùng chung -->
<footer th:replace="~{layout/fragments :: footer}"></footer>

</body>
</html>
