<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/fragments :: html_head('Sản phẩm')}"></head>
<body>

<header th:replace="~{layout/fragments :: header('products')}"></header>

<main class="container">
    <div style="border-bottom: 2px solid var(--border); padding-bottom: 12px; margin-bottom: 24px;">
        <h1 style="font-weight: 800; color: var(--dark); font-size: 2rem;">
            <i class="fa-solid fa-sparkles" style="color: var(--primary);"></i> Danh sách sản phẩm
        </h1>
    </div>

    <form class="filter-panel" th:action="@{/products}" method="get">
        <div class="filter-grid">
            <div class="form-group">
                <label for="keyword"><i class="fa-solid fa-magnifying-glass"></i> Tìm kiếm</label>
                <input id="keyword" name="keyword" class="form-control" type="text" placeholder="Tên sản phẩm..." th:value="${filter.keyword()}">
            </div>

            <div class="form-group">
                <label for="categoryId"><i class="fa-solid fa-folder"></i> Danh mục</label>
                <select id="categoryId" name="categoryId" class="form-control">
                    <option value="">Tất cả danh mục</option>
                    <option th:each="category : ${categories}"
                            th:value="${category.id}"
                            th:selected="${filter.categoryId() != null && filter.categoryId() == category.id}"
                            th:text="${category.name}">
                    </option>
                </select>
            </div>

            <div class="form-group">
                <label for="brandId"><i class="fa-solid fa-award"></i> Thương hiệu</label>
                <select id="brandId" name="brandId" class="form-control">
                    <option value="">Tất cả thương hiệu</option>
                    <option th:each="brand : ${brands}"
                            th:value="${brand.id}"
                            th:selected="${filter.brandId() != null && filter.brandId() == brand.id}"
                            th:text="${brand.name}">
                    </option>
                </select>
            </div>

            <div class="form-group">
                <label for="minPrice"><i class="fa-solid fa-money-bill"></i> Giá từ (đ)</label>
                <input id="minPrice" name="minPrice" class="form-control" type="number" min="0" placeholder="0" th:value="${filter.minPrice()}">
            </div>

            <div class="form-group">
                <label for="maxPrice"><i class="fa-solid fa-money-bill-wave"></i> Giá đến (đ)</label>
                <input id="maxPrice" name="maxPrice" class="form-control" type="number" min="0" placeholder="Đến..." th:value="${filter.maxPrice()}">
            </div>

            <div class="form-group">
                <label for="sort"><i class="fa-solid fa-arrow-down-wide-short"></i> Sắp xếp</label>
                <select id="sort" name="sort" class="form-control">
                    <option value="newest" th:selected="${filter.sort() == null || filter.sort() == 'newest'}">Mới nhất</option>
                    <option value="price_asc" th:selected="${filter.sort() == 'price_asc'}">Giá tăng dần</option>
                    <option value="price_desc" th:selected="${filter.sort() == 'price_desc'}">Giá giảm dần</option>
                    <option value="name_asc" th:selected="${filter.sort() == 'name_asc'}">Tên A-Z</option>
                    <option value="name_desc" th:selected="${filter.sort() == 'name_desc'}">Tên Z-A</option>
                </select>
            </div>

            <div style="display: flex; gap: 8px;">
                <button type="submit" class="btn btn-primary" style="flex-grow: 1;">
                    <i class="fa-solid fa-filter"></i> Lọc
                </button>
                <a th:href="@{/products}" class="btn btn-secondary" title="Xóa bộ lọc">
                    <i class="fa-solid fa-rotate-left"></i>
                </a>
            </div>
        </div>
    </form>

    <div th:if="${#lists.isEmpty(products)}" class="alert alert-error" style="text-align: center; justify-content: center; padding: 30px;">
        <i class="fa-solid fa-triangle-exclamation fa-2x"></i>
        <span>Không tìm thấy sản phẩm nào phù hợp với bộ lọc của bạn.</span>
    </div>

    <section class="product-grid" th:if="${!#lists.isEmpty(products)}">
        <article class="product-card" th:each="p : ${products}">
            <div class="product-badge-sale" th:if="${p.salePrice != null}">Giảm giá</div>

            <div class="product-image-container">
                <img class="product-image" th:if="${p.mainImagePath != null && !p.mainImagePath.isBlank()}" th:src="@{${p.mainImagePath}}" alt="Ảnh sản phẩm">
                <div class="product-image" th:unless="${p.mainImagePath != null && !p.mainImagePath.isBlank()}" style="display: flex; align-items: center; justify-content: center; background: #e2e8f0; color: #94a3b8;">
                    <i class="fa-regular fa-image fa-3x"></i>
                </div>
            </div>

            <div class="product-brand" th:text="${p.brand != null ? p.brand.name : 'Mỹ phẩm'}">Thương hiệu</div>
            <h3 class="product-name">
                <a th:href="@{/product/{id}(id=${p.id})}" th:text="${p.name}"></a>
            </h3>

            <div class="product-price-wrapper">
                <span class="product-price" th:text="${#numbers.formatDecimal(p.salePrice != null ? p.salePrice : p.price, 0, 'COMMA', 0, 'POINT')} + ' đ'"></span>
                <span class="product-old-price" th:if="${p.salePrice != null}" th:text="${#numbers.formatDecimal(p.price, 0, 'COMMA', 0, 'POINT')} + ' đ'"></span>
            </div>

            <div class="product-stock" th:classappend="${p.stockQuantity < 5} ? 'low-stock' : ''">
                <i class="fa-solid" th:classappend="${p.stockQuantity > 0} ? 'fa-boxes-stacked' : 'fa-circle-xmark'"></i>
                <span th:text="${p.stockQuantity > 0} ? 'Còn lại: ' + ${p.stockQuantity} : 'Hết hàng'"></span>
            </div>

            <a th:href="@{/product/{id}(id=${p.id})}" class="btn btn-outline" style="margin-top: 12px; width: 100%;">
                <i class="fa-solid fa-eye"></i> Xem chi tiết
            </a>
        </article>
    </section>
</main>

<footer th:replace="~{layout/fragments :: footer}"></footer>

</body>
</html>
