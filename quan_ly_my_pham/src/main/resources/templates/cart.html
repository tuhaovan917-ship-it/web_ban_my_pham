<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/fragments :: html_head('Giỏ hàng')}"></head>
<body>

<!-- Header dùng chung -->
<header th:replace="~{layout/fragments :: header('cart')}"></header>

<main class="container">
    <div style="border-bottom: 2px solid var(--border); padding-bottom: 12px; margin-bottom: 24px;">
        <h1 style="font-weight: 800; color: var(--dark); font-size: 2rem;">
            <i class="fa-solid fa-cart-shopping" style="color: var(--primary);"></i> Giỏ hàng của bạn
        </h1>
    </div>

    <!-- Alert Messages -->
    <div class="alert alert-success" th:if="${successMessage}">
        <i class="fa-solid fa-circle-check"></i>
        <span th:text="${successMessage}"></span>
    </div>
    <div class="alert alert-error" th:if="${errorMessage}">
        <i class="fa-solid fa-circle-exclamation"></i>
        <span th:text="${errorMessage}"></span>
    </div>

    <!-- Giỏ hàng trống -->
    <div th:if="${#lists.isEmpty(items)}" class="alert alert-secondary" style="text-align: center; justify-content: center; padding: 40px; background: #fff; border: 1px solid var(--border); border-radius: var(--radius-md);">
        <div style="margin-bottom: 16px; color: var(--text-muted);">
            <i class="fa-solid fa-basket-shopping fa-3x" style="color: var(--text-muted); opacity: 0.5;"></i>
        </div>
        <h3 style="font-weight: 700; color: var(--dark); margin-bottom: 8px;">Giỏ hàng của bạn đang trống</h3>
        <p style="color: var(--text-muted); margin-bottom: 20px;">Hãy lấp đầy giỏ hàng bằng những sản phẩm mỹ phẩm cao cấp của chúng tôi.</p>
        <a th:href="@{/products}" class="btn btn-primary">
            <i class="fa-solid fa-bag-shopping"></i> Tiếp tục mua sắm
        </a>
    </div>

    <!-- Có sản phẩm trong giỏ -->
    <div th:if="${!#lists.isEmpty(items)}" class="table-responsive" style="margin-bottom: 30px;">
        <table class="table-custom">
            <thead>
            <tr>
                <th style="width: 45%;">Sản phẩm</th>
                <th style="width: 25%; text-align: center;">Số lượng</th>
                <th style="width: 15%; text-align: center;">Tồn kho</th>
                <th style="width: 15%; text-align: center;">Thao tác</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="item : ${items}">
                <td>
                    <div style="display: flex; align-items: center; gap: 12px;">
                        <!-- Icon hoặc ảnh nhỏ của sản phẩm -->
                        <div style="width: 50px; height: 50px; background: #f1f5f9; border-radius: var(--radius-sm); overflow: hidden; border: 1px solid var(--border); flex-shrink: 0; display: flex; align-items: center; justify-content: center;">
                            <img th:if="${item.product.mainImagePath != null && !item.product.mainImagePath.isBlank()}" th:src="@{${item.product.mainImagePath}}" alt="" style="width: 100%; height: 100%; object-fit: cover;">
                            <i th:unless="${item.product.mainImagePath != null && !item.product.mainImagePath.isBlank()}" class="fa-regular fa-image" style="color: var(--text-muted)"></i>
                        </div>
                        <div>
                            <a th:href="@{/product/{id}(id=${item.product.id})}" th:text="${item.product.name}" style="font-weight: 700; color: var(--dark); font-size: 0.95rem;"></a>
                            <div style="color: var(--primary-dark); font-weight: 600; font-size: 0.85rem; margin-top: 4px;" th:text="${#numbers.formatDecimal(item.product.salePrice != null ? item.product.salePrice : item.product.price, 0, 'COMMA', 0, 'POINT')} + ' đ'"></div>
                        </div>
                    </div>
                </td>
                <td style="text-align: center;">
                    <form th:action="@{/cart/update}" method="post" style="display: inline-flex; align-items: center; gap: 6px; justify-content: center;">
                        <input type="hidden" name="productId" th:value="${item.product.id}">
                        <input class="form-control" type="number" name="quantity" min="1" th:max="${item.product.stockQuantity}" th:value="${item.quantity}" style="width: 70px; padding: 6px; text-align: center;">
                        <button type="submit" class="btn btn-secondary" style="padding: 6px 12px; font-size: 0.8rem;">
                            <i class="fa-solid fa-arrows-rotate"></i>
                        </button>
                    </form>
                </td>
                <td style="text-align: center; font-weight: 500; color: var(--text-muted);" th:text="${item.product.stockQuantity}"></td>
                <td style="text-align: center;">
                    <form th:action="@{/cart/remove}" method="post" style="display: inline-block; margin: 0;">
                        <input type="hidden" name="productId" th:value="${item.product.id}">
                        <button type="submit" class="btn btn-danger" style="padding: 6px 12px; font-size: 0.8rem;" onclick="return confirm('Xóa sản phẩm này khỏi giỏ hàng?');">
                            <i class="fa-solid fa-trash-can"></i> Xóa
                        </button>
                    </form>
                </td>
            </tr>
            </tbody>
        </table>
    </div>

    <!-- Thanh toán/Mua hàng tiếp -->
    <div th:if="${!#lists.isEmpty(items)}" style="display: flex; justify-content: space-between; align-items: center; background: #fff; border: 1px solid var(--border); border-radius: var(--radius-md); padding: 20px; box-shadow: var(--shadow-sm);">
        <a th:href="@{/products}" class="btn btn-secondary">
            <i class="fa-solid fa-arrow-left"></i> Tiếp tục mua sắm
        </a>
        <a th:href="@{/checkout}" class="btn btn-primary" style="padding: 12px 28px; font-size: 1.05rem;">
            Tiến hành thanh toán <i class="fa-solid fa-arrow-right"></i>
        </a>
    </div>
</main>

<!-- Footer dùng chung -->
<footer th:replace="~{layout/fragments :: footer}"></footer>

</body>
</html>
