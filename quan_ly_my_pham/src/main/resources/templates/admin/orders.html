<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/fragments :: html_head('Quản lý đơn hàng')}"></head>
<body>

<div class="admin-layout">
    <aside th:replace="~{layout/fragments :: admin_sidebar('orders')}"></aside>

    <div class="admin-main">
        <header class="admin-navbar">
            <span style="font-weight: 700; color: var(--text-main); font-size: 1.1rem;">
                <i class="fa-solid fa-truck-ramp-box" style="color: var(--primary); margin-right: 8px;"></i>QUẢN LÝ ĐƠN HÀNG
            </span>
            <div style="font-size: 0.85rem; color: var(--text-muted); font-weight: 500;">
                Mỹ Phẩm Glow &bull; Trang quản trị
            </div>
        </header>

        <main class="admin-container">
            <section class="admin-card">
                <div class="admin-section-header" style="flex-wrap: wrap; gap: 16px; margin-bottom: 24px;">
                    <h2 style="font-size: 1.4rem; font-weight: 800; color: var(--dark); margin: 0;">Danh sách đơn hàng</h2>

                    <form th:action="@{/admin/orders}" method="get" style="display: flex; gap: 8px; align-items: center; margin: 0;">
                        <label for="status" style="font-weight: 600; font-size: 0.9rem; color: var(--text-muted);">Trạng thái:</label>
                        <select id="status" name="status" class="form-control" style="padding: 6px 12px; font-size: 0.85rem;">
                            <option value="">-- Tất cả --</option>
                            <option th:each="status : ${statuses}"
                                    th:value="${status}"
                                    th:selected="${status == selectedStatus}"
                                    th:text="${status.displayName}">
                            </option>
                        </select>
                        <button type="submit" class="btn btn-primary" style="padding: 6px 14px; font-size: 0.85rem;">
                            <i class="fa-solid fa-filter"></i> Lọc
                        </button>
                    </form>
                </div>

                <div class="table-responsive">
                    <table class="table-custom">
                        <thead>
                        <tr>
                            <th style="width: 10%; text-align: center;">Mã đơn</th>
                            <th style="width: 20%;">Khách hàng</th>
                            <th style="width: 20%;">Ngày đặt</th>
                            <th style="width: 18%;">Người nhận</th>
                            <th style="width: 15%; text-align: center;">Trạng thái</th>
                            <th style="width: 17%; text-align: right;">Tổng tiền</th>
                            <th style="width: 10%; text-align: center;"></th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="order : ${orders}">
                            <td style="text-align: center; font-weight: 700; color: var(--dark);" th:text="${order.id}"></td>
                            <td th:text="${order.user.fullName}"></td>
                            <td th:text="${#temporals.format(order.orderDate, 'dd/MM/yyyy HH:mm')}"></td>
                            <td th:text="${order.receiverName}"></td>
                            <td style="text-align: center;">
                                <span class="badge" th:classappend="${order.status.badgeClass}" th:text="${order.status.displayName}">Trạng thái</span>
                            </td>
                            <td style="text-align: right; font-weight: 800; color: var(--primary-dark);" th:text="${#numbers.formatDecimal(order.totalAmount, 0, 'COMMA', 0, 'POINT')} + ' đ'"></td>
                            <td style="text-align: center;">
                                <a th:href="@{/admin/orders/{id}(id=${order.id})}" class="btn btn-secondary" style="padding: 6px 12px; font-size: 0.85rem;">
                                    <i class="fa-solid fa-circle-info"></i> Chi tiết
                                </a>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(orders)}">
                            <td colspan="7" style="text-align: center; color: var(--text-muted); padding: 20px;">Không tìm thấy đơn hàng phù hợp.</td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>
</div>

</body>
</html>
