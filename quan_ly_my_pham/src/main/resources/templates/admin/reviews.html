<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/fragments :: html_head('Quản lý đánh giá')}"></head>
<body>
<div class="admin-layout">
    <aside th:replace="~{layout/fragments :: admin_sidebar('reviews')}"></aside>

    <main class="admin-main">
        <header class="admin-navbar">
            <div class="admin-page-title">
                <h1>Quản lý đánh giá</h1>
                <p>Duyệt, từ chối hoặc xóa phản hồi của khách hàng.</p>
            </div>
            <div style="font-size: 0.85rem; color: var(--text-muted); font-weight: 500;">
                GlowCosmetics &bull; Admin Panel
            </div>
        </header>

        <section class="admin-container">
            <div th:if="${successMessage}" class="alert alert-success">
                <i class="fa-solid fa-circle-check"></i>
                <span th:text="${successMessage}"></span>
            </div>
            <div th:if="${errorMessage}" class="alert alert-error">
                <i class="fa-solid fa-circle-exclamation"></i>
                <span th:text="${errorMessage}"></span>
            </div>

            <div class="filter-panel">
                <form class="filter-grid" th:action="@{/admin/reviews}" method="get">
                    <div class="form-group">
                        <label for="status">Trạng thái</label>
                        <select id="status" class="form-control" name="status">
                            <option value="">Tất cả</option>
                            <option th:each="status : ${statuses}"
                                    th:value="${status}"
                                    th:selected="${status == selectedStatus}"
                                    th:text="${status.displayName}">
                            </option>
                        </select>
                    </div>
                    <button class="btn btn-primary" type="submit">
                        <i class="fa-solid fa-filter"></i> Lọc
                    </button>
                </form>
            </div>

            <div class="admin-card">
                <div class="table-responsive">
                    <table class="table-custom">
                        <thead>
                        <tr>
                            <th>Mã</th>
                            <th>Sản phẩm</th>
                            <th>Khách hàng</th>
                            <th>Sao</th>
                            <th>Nội dung</th>
                            <th>Đơn hàng</th>
                            <th>Ngày tạo</th>
                            <th>Trạng thái</th>
                            <th>Thao tác</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="review : ${reviews}">
                            <td th:text="${review.id}"></td>
                            <td>
                                <a th:href="@{/product/{id}(id=${review.product.id})}" th:text="${review.product.name}"></a>
                            </td>
                            <td>
                                <div th:text="${review.user.fullName}"></div>
                                <div class="muted-text" th:text="${review.user.userName}"></div>
                            </td>
                            <td>
                                <span style="color: var(--warning); font-weight: 800;" th:text="${review.stars} + '/5'"></span>
                            </td>
                            <td th:text="${review.comment != null ? review.comment : ''}"></td>
                            <td>
                                <a th:if="${review.order != null}" th:href="@{/admin/orders/{id}(id=${review.order.id})}"
                                   th:text="${review.order.id}"></a>
                                <span class="muted-text" th:if="${review.order == null}">Không có</span>
                            </td>
                            <td th:text="${#temporals.format(review.createdAt, 'dd/MM/yyyy HH:mm')}"></td>
                            <td>
                                <span class="badge"
                                      th:classappend="${review.status.name() == 'APPROVED' ? 'badge-active' : (review.status.name() == 'REJECTED' ? 'badge-cancelled' : 'badge-pending')}"
                                      th:text="${review.status.displayName}"></span>
                            </td>
                            <td>
                                <div class="admin-inline-actions">
                                    <form th:if="${review.status.name() != 'APPROVED'}"
                                          th:action="@{/admin/reviews/{id}/status(id=${review.id})}" method="post">
                                        <input type="hidden" name="status" value="APPROVED">
                                        <button class="btn btn-secondary" style="padding: 6px 10px; font-size: 0.82rem;" type="submit">Duyệt</button>
                                    </form>
                                    <form th:if="${review.status.name() != 'REJECTED'}"
                                          th:action="@{/admin/reviews/{id}/status(id=${review.id})}" method="post">
                                        <input type="hidden" name="status" value="REJECTED">
                                        <button class="btn btn-secondary" style="padding: 6px 10px; font-size: 0.82rem;" type="submit">Từ chối</button>
                                    </form>
                                    <form th:if="${review.status.name() != 'PENDING'}"
                                          th:action="@{/admin/reviews/{id}/status(id=${review.id})}" method="post">
                                        <input type="hidden" name="status" value="PENDING">
                                        <button class="btn btn-secondary" style="padding: 6px 10px; font-size: 0.82rem;" type="submit">Chờ duyệt</button>
                                    </form>
                                    <form th:action="@{/admin/reviews/{id}/delete(id=${review.id})}" method="post"
                                          onsubmit="return confirm('Bạn chắc chắn muốn xóa đánh giá này?');">
                                        <button class="btn btn-danger" style="padding: 6px 10px; font-size: 0.82rem;" type="submit">
                                            <i class="fa-solid fa-trash"></i>
                                        </button>
                                    </form>
                                </div>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(reviews)}">
                            <td colspan="9" class="muted-text">Chưa có đánh giá phù hợp.</td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </section>
    </main>
</div>
</body>
</html>
