<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/fragments :: html_head('Quản lý danh mục')}"></head>
<body>
<div class="admin-layout">
    <aside th:replace="~{layout/fragments :: admin_sidebar('categories')}"></aside>

    <div class="admin-main">
        <header class="admin-navbar">
            <span style="font-weight: 700; color: var(--text-main); font-size: 1.1rem;">
                <i class="fa-solid fa-folder-open" style="color: var(--primary); margin-right: 8px;"></i>QUẢN LÝ DANH MỤC
            </span>
            <div style="font-size: 0.85rem; color: var(--text-muted); font-weight: 500;">Mỹ Phẩm Glow &bull; Trang quản trị</div>
        </header>

        <main class="admin-container">
            <div class="alert alert-success" th:if="${successMessage}">
                <i class="fa-solid fa-circle-check"></i>
                <span th:text="${successMessage}"></span>
            </div>
            <div class="alert alert-error" th:if="${errorMessage}">
                <i class="fa-solid fa-circle-exclamation"></i>
                <span th:text="${errorMessage}"></span>
            </div>

            <section class="admin-card">
                <div class="admin-section-header">
                    <h2 style="font-size: 1.4rem; font-weight: 800; color: var(--dark); margin: 0;">
                        <i class="fa-solid fa-layer-group" style="color: var(--primary);"></i> Danh mục sản phẩm
                    </h2>
                    <a class="btn btn-primary" th:href="@{/admin/categories/new}">
                        <i class="fa-solid fa-plus"></i> Thêm danh mục
                    </a>
                </div>

                <div class="table-responsive">
                    <table class="table-custom">
                        <thead>
                        <tr>
                            <th style="width: 25%;">Tên danh mục</th>
                            <th style="width: 45%;">Mô tả</th>
                            <th style="width: 15%; text-align: center;">Trạng thái</th>
                            <th style="width: 15%; text-align: center;">Thao tác</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="category : ${categories}">
                            <td th:text="${category.name}" style="font-weight: 700; color: var(--dark);"></td>
                            <td th:text="${category.description != null ? category.description : ''}"></td>
                            <td style="text-align: center;">
                                <span class="badge" th:classappend="${category.active} ? 'badge-completed' : 'badge-cancelled'"
                                      th:text="${category.active} ? 'Đang dùng' : 'Tạm ẩn'"></span>
                            </td>
                            <td style="text-align: center;">
                                <div style="display: flex; gap: 8px; justify-content: center;">
                                    <a class="btn btn-secondary" style="padding: 6px 12px; font-size: 0.85rem;" th:href="@{/admin/categories/{id}/edit(id=${category.id})}">
                                        <i class="fa-solid fa-pen-to-square"></i> Sửa
                                    </a>
                                    <form th:action="@{/admin/categories/{id}/delete(id=${category.id})}" method="post"
                                          onsubmit="return confirm('Bạn chắc chắn muốn xóa danh mục này?');" style="display: inline;">
                                        <button type="submit" class="btn btn-danger" style="padding: 6px 12px; font-size: 0.85rem;">
                                            <i class="fa-solid fa-trash-can"></i> Xóa
                                        </button>
                                    </form>
                                </div>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(categories)}">
                            <td colspan="4" style="text-align: center; color: var(--text-muted); padding: 20px;">Chưa có danh mục sản phẩm nào.</td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>
</div>
</body>
</html>
