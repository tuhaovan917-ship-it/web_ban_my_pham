<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/fragments :: html_head('Quản lý người dùng')}"></head>
<body>
<div class="admin-layout">
    <aside th:replace="~{layout/fragments :: admin_sidebar('users')}"></aside>

    <main class="admin-main">
        <header class="admin-navbar">
            <div class="admin-page-title">
                <h1>
                    <i class="fa-solid fa-users-gear" style="color: var(--primary);"></i>
                    Quản lý người dùng
                </h1>
                <p>Theo dõi tài khoản khách hàng và khóa/mở khóa khi cần.</p>
            </div>
            <div style="font-size: 0.85rem; color: var(--text-muted); font-weight: 500;">
                Mỹ Phẩm Glow &bull; Trang quản trị
            </div>
        </header>

        <section class="admin-container">
            <div th:if="${successMessage}" class="alert alert-success">
                <i class="fa-solid fa-circle-check"></i>
                <span th:text="${successMessage}"></span>
            </div>
            <div th:if="${errorMessage}" class="alert alert-error">
                <i class="fa-solid fa-circle-exclamation"></i>
                <span th:text="${errorMessage}"></span>
            </div>

            <div class="admin-card">
                <div class="admin-section-header">
                    <h2>
                        <i class="fa-solid fa-address-book" style="color: var(--primary);"></i>
                        Danh sách người dùng
                    </h2>
                </div>

                <div class="table-responsive">
                    <table class="table-custom">
                        <thead>
                        <tr>
                            <th>Tên đăng nhập</th>
                            <th>Họ tên</th>
                            <th>Liên hệ</th>
                            <th>Vai trò</th>
                            <th>Trạng thái</th>
                            <th>Ngày tạo</th>
                            <th>Thao tác</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="user : ${users}">
                            <td><strong th:text="${user.userName}"></strong></td>
                            <td th:text="${user.fullName}"></td>
                            <td>
                                <div th:text="${user.email}"></div>
                                <div class="muted-text" th:text="${user.phone != null ? user.phone : 'Chưa có số điện thoại'}"></div>
                            </td>
                            <td>
                                <span class="badge badge-muted" th:text="${user.role.displayName}"></span>
                            </td>
                            <td>
                                <span class="badge" th:classappend="${user.active ? 'badge-active' : 'badge-cancelled'}"
                                      th:text="${user.active ? 'Đang hoạt động' : 'Bị khóa'}"></span>
                            </td>
                            <td th:text="${#temporals.format(user.createdAt, 'dd/MM/yyyy HH:mm')}"></td>
                            <td>
                                <div class="admin-inline-actions">
                                    <form th:if="${user.active && user.id != currentUserId && user.role.name() != 'ADMIN'}"
                                          th:action="@{/admin/users/{id}/lock(id=${user.id})}"
                                          method="post"
                                          onsubmit="return confirm('Bạn chắc chắn muốn khóa tài khoản này?');">
                                        <button class="btn btn-danger" style="padding: 6px 10px; font-size: 0.82rem;" type="submit">
                                            <i class="fa-solid fa-lock"></i> Khóa
                                        </button>
                                    </form>
                                    <form th:if="${!user.active}"
                                          th:action="@{/admin/users/{id}/unlock(id=${user.id})}"
                                          method="post">
                                        <button class="btn btn-secondary" style="padding: 6px 10px; font-size: 0.82rem;" type="submit">
                                            <i class="fa-solid fa-lock-open"></i> Mở khóa
                                        </button>
                                    </form>
                                    <span class="muted-text" th:if="${user.id == currentUserId}">Tài khoản hiện tại</span>
                                    <span class="muted-text" th:if="${user.role.name() == 'ADMIN' && user.id != currentUserId}">Quản trị viên</span>
                                </div>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(users)}">
                            <td colspan="7" class="muted-text">Chưa có người dùng.</td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </section>
    </main>
</div>
</body>
</html>
