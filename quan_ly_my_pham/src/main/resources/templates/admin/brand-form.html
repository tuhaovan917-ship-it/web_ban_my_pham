<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/fragments :: html_head(${pageTitle})}"></head>
<body>
<div class="admin-layout">
    <aside th:replace="~{layout/fragments :: admin_sidebar('brands')}"></aside>
    <main class="admin-main">
        <header class="admin-navbar">
            <div class="admin-page-title">
                <h1 th:text="${pageTitle}">Thương hiệu</h1>
                <p>Quản lý nhãn hàng để danh mục sản phẩm rõ ràng hơn.</p>
            </div>
            <a th:href="@{/admin/brands}" class="btn btn-secondary">
                <i class="fa-solid fa-arrow-left"></i> Danh sách
            </a>
        </header>

        <section class="admin-container">
            <div th:if="${errorMessage}" class="alert alert-error">
                <i class="fa-solid fa-circle-exclamation"></i>
                <span th:text="${errorMessage}"></span>
            </div>

            <div class="admin-card">
                <form class="admin-form" th:action="@{${actionUrl}}" method="post">
                    <div class="form-group">
                        <label for="name">Tên thương hiệu</label>
                        <input id="name" class="form-control" name="name" type="text" maxlength="80" required
                               th:value="${brand != null ? brand.name : ''}">
                    </div>
                    <div class="form-group">
                        <label for="description">Mô tả</label>
                        <textarea id="description" class="form-control" name="description" rows="4" maxlength="255"
                                  th:text="${brand != null ? brand.description : ''}"></textarea>
                    </div>
                    <div class="form-group">
                        <label for="active">Trạng thái</label>
                        <select id="active" class="form-control" name="active">
                            <option value="true" th:selected="${brand == null || brand.active}">Đang dùng</option>
                            <option value="false" th:selected="${brand != null && !brand.active}">Tạm ẩn</option>
                        </select>
                    </div>
                    <div class="admin-form-actions">
                        <a class="btn btn-secondary" th:href="@{/admin/brands}">Hủy</a>
                        <button class="btn btn-primary" type="submit">
                            <i class="fa-solid fa-floppy-disk"></i> Lưu thương hiệu
                        </button>
                    </div>
                </form>
            </div>
        </section>
    </main>
</div>
</body>
</html>
