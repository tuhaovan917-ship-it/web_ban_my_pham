<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/fragments :: html_head(${pageTitle})}"></head>
<body>
<div class="admin-layout">
    <aside th:replace="~{layout/fragments :: admin_sidebar('products')}"></aside>

    <main class="admin-main">
        <header class="admin-navbar">
            <div class="admin-page-title">
                <h1><i class="fa-solid fa-bottle-droplet" style="color: var(--primary);"></i> <span th:text="${pageTitle}">Sản phẩm</span></h1>
                <p>Quản lý thông tin bán hàng, tồn kho và ảnh đại diện.</p>
            </div>
            <a th:href="@{/admin/products}" class="btn btn-secondary">
                <i class="fa-solid fa-arrow-left"></i> Danh sách
            </a>
        </header>

        <section class="admin-container">
            <div th:if="${errorMessage}" class="alert alert-error">
                <i class="fa-solid fa-circle-exclamation"></i>
                <span th:text="${errorMessage}"></span>
            </div>

            <div class="admin-card">
                <form class="admin-form" th:action="@{${actionUrl}}" method="post" enctype="multipart/form-data">
                    <div class="admin-form-grid">
                        <div class="form-group">
                            <label for="name">Tên sản phẩm</label>
                            <input id="name" class="form-control" name="name" type="text" maxlength="100" required
                                   th:value="${product != null ? product.name : ''}">
                        </div>
                        <div class="form-group">
                            <label for="categoryId">Danh mục</label>
                            <select id="categoryId" class="form-control" name="categoryId" required>
                                <option value="">Chọn danh mục</option>
                                <option th:each="category : ${categories}"
                                        th:value="${category.id}"
                                        th:selected="${product != null && product.category != null && product.category.id == category.id}"
                                        th:text="${category.active ? category.name : category.name + ' (đang tạm ẩn)'}">
                                </option>
                            </select>
                            <span class="muted-text">Sản phẩm chỉ hiện ở cửa hàng khi danh mục đang dùng.</span>
                        </div>
                    </div>

                    <div class="admin-form-grid">
                        <div class="form-group">
                            <label for="brandId">Thương hiệu</label>
                            <select id="brandId" class="form-control" name="brandId">
                                <option value="">Không chọn</option>
                                <option th:each="brand : ${brands}"
                                        th:value="${brand.id}"
                                        th:selected="${product != null && product.brand != null && product.brand.id == brand.id}"
                                        th:text="${brand.active ? brand.name : brand.name + ' (đang tạm ẩn)'}">
                                </option>
                            </select>
                            <span class="muted-text">Nếu thương hiệu đang tạm ẩn, sản phẩm sẽ chưa hiện ở cửa hàng.</span>
                        </div>
                        <div class="form-group">
                            <label for="stockQuantity">Số lượng tồn</label>
                            <input id="stockQuantity" class="form-control" name="stockQuantity" type="number" min="0" required
                                   th:value="${product != null ? product.stockQuantity : 0}">
                        </div>
                    </div>

                    <div class="admin-form-grid">
                        <div class="form-group">
                            <label for="price">Giá gốc</label>
                            <input id="price" class="form-control" name="price" type="number" min="0" step="1000" required
                                   th:value="${product != null ? product.price : ''}">
                        </div>
                        <div class="form-group">
                            <label for="salePrice">Giá khuyến mãi</label>
                            <input id="salePrice" class="form-control" name="salePrice" type="number" min="0" step="1000"
                                   th:value="${product != null && product.salePrice != null ? product.salePrice : ''}">
                        </div>
                    </div>

                    <div class="admin-form-grid">
                        <div class="form-group">
                            <label for="featured">Sản phẩm nổi bật</label>
                            <select id="featured" class="form-control" name="featured">
                                <option value="false" th:selected="${product == null || !product.featured}">Không</option>
                                <option value="true" th:selected="${product != null && product.featured}">Có</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="active">Trạng thái</label>
                            <select id="active" class="form-control" name="active">
                                <option value="true" th:selected="${product == null || product.active}">Đang bán</option>
                                <option value="false" th:selected="${product != null && !product.active}">Tạm ẩn</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="description">Mô tả</label>
                        <textarea id="description" class="form-control" name="description" rows="5"
                                  th:text="${product != null ? product.description : ''}"></textarea>
                    </div>

                    <div class="admin-form-grid">
                        <div class="form-group">
                            <label for="imageFile">Ảnh đại diện</label>
                            <input id="imageFile" class="form-control" name="imageFile" type="file"
                                   accept=".jpg,.jpeg,.png,.webp,image/jpeg,image/png,image/webp">
                            <span class="muted-text">Chấp nhận JPG, PNG, WEBP.</span>
                        </div>
                        <div class="form-group" th:if="${product != null && product.mainImagePath != null && !product.mainImagePath.isBlank()}">
                            <label>Ảnh hiện tại</label>
                            <img class="admin-preview-image" th:src="@{${product.mainImagePath}}" th:alt="${product.name}">
                        </div>
                    </div>

                    <div class="admin-form-actions">
                        <a class="btn btn-secondary" th:href="@{/admin/products}">Hủy</a>
                        <button class="btn btn-primary" type="submit">
                            <i class="fa-solid fa-floppy-disk"></i> Lưu sản phẩm
                        </button>
                    </div>
                </form>
            </div>
        </section>
    </main>
</div>
</body>
</html>
