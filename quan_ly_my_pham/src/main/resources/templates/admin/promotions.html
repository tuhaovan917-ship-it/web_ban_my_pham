<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/fragments :: html_head('Quản lý khuyến mãi')}"></head>
<body>
<div class="admin-layout">
    <aside th:replace="~{layout/fragments :: admin_sidebar('promotions')}"></aside>

    <main class="admin-main">
        <header class="admin-navbar">
            <div class="admin-page-title">
                <h1><i class="fa-solid fa-tags" style="color: var(--primary);"></i> Quản lý khuyến mãi</h1>
                <p>Tạo, bật tắt và theo dõi lượt sử dụng mã giảm giá.</p>
            </div>
            <div style="display: flex; align-items: center; gap: 14px;">
                <a class="btn btn-primary" th:href="@{/admin/promotions/new}">
                    <i class="fa-solid fa-plus"></i> Thêm mã khuyến mãi
                </a>
                <div style="font-size: 0.85rem; color: var(--text-muted); font-weight: 500;">Mỹ Phẩm Glow &bull; Trang quản trị</div>
            </div>
        </header>

        <section class="admin-container">
            <div th:if="${successMessage}" class="alert alert-success">
                <i class="fa-solid fa-circle-check"></i>
                <span th:text="${successMessage}"></span>
            </div>
            <div th:if="${errorMessage}" class="alert alert-error">
                <i class="fa-solid fa-circle-exclamation"></i>
                <span th:text="${errorMessage}"></span>
            </div>

            <div class="admin-card">
                <div class="admin-section-header">
                    <h2 style="font-size: 1.35rem; font-weight: 800; color: var(--dark); margin: 0;">
                        <i class="fa-solid fa-ticket" style="color: var(--primary);"></i> Danh sách mã khuyến mãi
                    </h2>
                </div>

                <div class="table-responsive">
                    <table class="table-custom">
                        <thead>
                        <tr>
                            <th>Mã</th>
                            <th>Loại</th>
                            <th>Giá trị</th>
                            <th>Điều kiện</th>
                            <th>Thời gian</th>
                            <th>Lượt dùng</th>
                            <th>Trạng thái</th>
                            <th>Thao tác</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="promotion : ${promotions}">
                            <td>
                                <strong th:text="${promotion.code}"></strong>
                                <div class="muted-text" th:if="${promotion.description}" th:text="${promotion.description}"></div>
                            </td>
                            <td th:text="${promotion.discountType.displayName}">Loại giảm</td>
                            <td>
                                <span th:if="${promotion.discountType.name() == 'PERCENT'}"
                                      th:text="${#numbers.formatDecimal(promotion.discountValue, 0, 'COMMA', 2, 'POINT')} + '%'"></span>
                                <span th:if="${promotion.discountType.name() == 'FIXED'}"
                                      th:text="${#numbers.formatDecimal(promotion.discountValue, 0, 'COMMA', 0, 'POINT')} + ' đ'"></span>
                                <div class="muted-text" th:if="${promotion.maxDiscount != null}"
                                     th:text="'Tối đa ' + ${#numbers.formatDecimal(promotion.maxDiscount, 0, 'COMMA', 0, 'POINT')} + ' đ'"></div>
                            </td>
                            <td th:text="'Từ ' + ${#numbers.formatDecimal(promotion.minOrderAmount, 0, 'COMMA', 0, 'POINT')} + ' đ'"></td>
                            <td>
                                <div th:text="${#temporals.format(promotion.startDate, 'dd/MM/yyyy HH:mm')}"></div>
                                <div class="muted-text" th:text="${#temporals.format(promotion.endDate, 'dd/MM/yyyy HH:mm')}"></div>
                            </td>
                            <td>
                                <span th:text="${promotion.usedCount}"></span>
                                <span>/</span>
                                <span th:text="${promotion.usageLimit != null ? promotion.usageLimit : 'Không giới hạn'}"></span>
                            </td>
                            <td>
                                <span class="badge" th:classappend="${promotion.active ? 'badge-active' : 'badge-muted'}"
                                      th:text="${promotion.active ? 'Đang bật' : 'Tạm tắt'}"></span>
                            </td>
                            <td>
                                <div class="admin-inline-actions">
                                    <a class="btn btn-secondary" style="padding: 6px 10px; font-size: 0.82rem;"
                                       th:href="@{/admin/promotions/{id}/edit(id=${promotion.id})}">
                                        <i class="fa-solid fa-pen"></i> Sửa
                                    </a>
                                    <form th:action="@{/admin/promotions/{id}/toggle-active(id=${promotion.id})}" method="post">
                                        <button class="btn btn-secondary" style="padding: 6px 10px; font-size: 0.82rem;" type="submit">
                                            <i class="fa-solid" th:classappend="${promotion.active ? 'fa-toggle-off' : 'fa-toggle-on'}"></i>
                                            <span th:text="${promotion.active ? 'Tắt' : 'Bật'}"></span>
                                        </button>
                                    </form>
                                    <form th:action="@{/admin/promotions/{id}/delete(id=${promotion.id})}" method="post"
                                          onsubmit="return confirm('Bạn chắc chắn muốn xóa mã khuyến mãi này?');">
                                        <button class="btn btn-danger" style="padding: 6px 10px; font-size: 0.82rem;" type="submit">
                                            <i class="fa-solid fa-trash"></i> Xóa
                                        </button>
                                    </form>
                                </div>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(promotions)}">
                            <td colspan="8" class="muted-text" style="text-align: center;">Chưa có mã khuyến mãi.</td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </section>
    </main>
</div>
</body>
</html>
