<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/fragments :: html_head('Không có quyền truy cập')}"></head>
<body>
<header th:replace="~{layout/fragments :: header('')}"></header>
<main class="container">
    <section class="admin-card" style="max-width: 640px; margin: 48px auto; text-align: center;">
        <i class="fa-solid fa-shield-halved" style="font-size: 3rem; color: var(--primary);"></i>
        <h1 style="margin-top: 16px;">Không có quyền truy cập</h1>
        <p class="muted-text">Tài khoản hiện tại không được phép mở trang này.</p>
        <div style="display: flex; justify-content: center; gap: 12px; margin-top: 20px; flex-wrap: wrap;">
            <a th:if="${currentUser != null && currentUser.role.name() == 'ADMIN'}" th:href="@{/admin}" class="btn btn-primary">
                <i class="fa-solid fa-toolbox"></i> Về trang quản trị
            </a>
            <a th:href="@{/products}" class="btn btn-secondary">
                <i class="fa-solid fa-arrow-left"></i> Xem sản phẩm
            </a>
        </div>
    </section>
</main>
<footer th:replace="~{layout/fragments :: footer}"></footer>
</body>
</html>
