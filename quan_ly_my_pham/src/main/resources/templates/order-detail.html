<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Chi tiet don hang</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; background: #f7f7f7; color: #222; }
        header { padding: 16px 32px; background: #fff; border-bottom: 1px solid #ddd; display: flex; justify-content: space-between; align-items: center; }
        main { max-width: 1040px; margin: 24px auto; padding: 0 16px; }
        section { background: #fff; border: 1px solid #ddd; padding: 20px; margin-bottom: 16px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
        input, select, textarea, button { padding: 9px; }
        button { cursor: pointer; }
        textarea { width: 100%; box-sizing: border-box; min-height: 70px; resize: vertical; margin-top: 8px; }
        .message { padding: 10px; margin-bottom: 12px; border: 1px solid #b6d7b6; background: #eef6ee; }
        .error { border-color: #e6b5b5; background: #fdecec; }
        .summary-row { display: flex; justify-content: space-between; margin: 8px 0; }
        a { color: #0066cc; text-decoration: none; }
    </style>
</head>
<body>
<header>
    <strong>Quan Ly My Pham</strong>
    <nav>
        <a th:href="@{/orders}">Lich su don hang</a>
        <span> | </span>
        <a th:href="@{/products}">San pham</a>
    </nav>
</header>

<main>
    <div class="message" th:if="${successMessage}" th:text="${successMessage}"></div>
    <div class="message error" th:if="${errorMessage}" th:text="${errorMessage}"></div>

    <section>
        <h1 th:text="'Don hang #' + ${order.id}"></h1>
        <p th:text="'Trang thai: ' + ${order.status}"></p>
        <p th:text="'Ngay dat: ' + ${#temporals.format(order.orderDate, 'dd/MM/yyyy HH:mm')}"></p>
        <p th:text="'Nguoi nhan: ' + ${order.receiverName}"></p>
        <p th:text="'So dien thoai: ' + ${order.receiverPhone}"></p>
        <p th:text="'Dia chi: ' + ${order.shippingAddress}"></p>
        <p th:text="'Thanh toan: ' + ${order.paymentMethod}"></p>

        <form th:if="${canCancel}" th:action="@{/orders/{id}/cancel(id=${order.id})}" method="post">
            <button type="submit">Huy don hang</button>
        </form>
    </section>

    <section>
        <h2>San pham</h2>
        <table>
            <thead>
            <tr>
                <th>San pham</th>
                <th>Don gia</th>
                <th>So luong</th>
                <th>Thanh tien</th>
                <th th:if="${canReview}">Danh gia</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="detail : ${order.orderDetails}">
                <td>
                    <a th:href="@{/product/{id}(id=${detail.product.id})}" th:text="${detail.productName}"></a>
                </td>
                <td th:text="${#numbers.formatDecimal(detail.unitPrice, 0, 'COMMA', 0, 'POINT')} + ' VND'"></td>
                <td th:text="${detail.quantity}"></td>
                <td th:text="${#numbers.formatDecimal(detail.lineTotal, 0, 'COMMA', 0, 'POINT')} + ' VND'"></td>
                <td th:if="${canReview}">
                    <div th:if="${reviewedProductIds.contains(detail.product.id)}">Da gui danh gia</div>
                    <form th:unless="${reviewedProductIds.contains(detail.product.id)}"
                          th:action="@{/orders/{id}/reviews(id=${order.id})}"
                          method="post">
                        <input type="hidden" name="productId" th:value="${detail.product.id}">
                        <select name="stars" required>
                            <option value="5">5 sao</option>
                            <option value="4">4 sao</option>
                            <option value="3">3 sao</option>
                            <option value="2">2 sao</option>
                            <option value="1">1 sao</option>
                        </select>
                        <textarea name="comment" maxlength="500" placeholder="Nhan xet cua ban"></textarea>
                        <button type="submit">Gui danh gia</button>
                    </form>
                </td>
            </tr>
            </tbody>
        </table>
    </section>

    <section>
        <h2>Tong ket</h2>
        <div class="summary-row">
            <span>Tam tinh</span>
            <strong th:text="${#numbers.formatDecimal(order.subtotalAmount, 0, 'COMMA', 0, 'POINT')} + ' VND'"></strong>
        </div>
        <div class="summary-row">
            <span>Giam gia</span>
            <strong th:text="${#numbers.formatDecimal(order.discountAmount, 0, 'COMMA', 0, 'POINT')} + ' VND'"></strong>
        </div>
        <div class="summary-row">
            <span>Phi giao hang</span>
            <strong th:text="${#numbers.formatDecimal(order.shippingFee, 0, 'COMMA', 0, 'POINT')} + ' VND'"></strong>
        </div>
        <div class="summary-row">
            <span>Tong tien</span>
            <strong th:text="${#numbers.formatDecimal(order.totalAmount, 0, 'COMMA', 0, 'POINT')} + ' VND'"></strong>
        </div>
    </section>
</main>
</body>
</html>
